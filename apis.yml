apis:
  - name: iNaturalist API v1
    description: >
      The primary iNaturalist REST API (v1) providing read and write access to
      observations, taxa, identifications, places, projects, users, and other
      iNaturalist resources. Built on Node.js with Elasticsearch and backed by
      the iNaturalist PostgreSQL database.
    image: https://static.inaturalist.org/sites/1-logo.svg
    humanURL: https://www.inaturalist.org/pages/api+reference
    baseURL: https://api.inaturalist.org/v1
    tags:
      - Observations
      - Taxa
      - Identifications
      - Places
      - Projects
      - Users
      - Biodiversity
    properties:
      - type: Documentation
        url: https://www.inaturalist.org/pages/api+reference
      - type: OpenAPI
        url: https://api.inaturalist.org/v1/docs/swagger.json
      - type: PostmanCollection
        url: https://www.postman.com/collections/inaturalist-api
      - type: RateLimits
        url: https://raw.githubusercontent.com/api-evangelist/inaturalist/main/rate-limits/rate-limits.yml
      - type: Plans
        url: https://raw.githubusercontent.com/api-evangelist/inaturalist/main/plans/plans.yml
      - type: FinOps
        url: https://raw.githubusercontent.com/api-evangelist/inaturalist/main/finops/finops.yml
    contact:
      - FN: iNaturalist Help
        url: https://help.inaturalist.org
        email: help@inaturalist.org
  - name: iNaturalist API v2
    description: >
      The next-generation iNaturalist API (v2) currently in development,
      designed to eventually replace v0 and v1 endpoints. Provides access to
      observation data with improved performance and response formats.
    image: https://static.inaturalist.org/sites/1-logo.svg
    humanURL: https://www.inaturalist.org/pages/api+reference
    baseURL: https://api.inaturalist.org/v2
    tags:
