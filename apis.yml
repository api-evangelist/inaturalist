name: iNaturalist
description: >
  iNaturalist is a nature observation platform and citizen science network that
  connects people to nature through biodiversity observation and identification.
  The iNaturalist API provides programmatic access to over 200 million wildlife
  observations, species identifications, taxon data, and biodiversity records
  contributed by citizen scientists worldwide. The API supports reading and
  writing observations, taxa lookups, identifications, places, projects, and
  user data across v0, v1, and v2 endpoints.
image: https://static.inaturalist.org/sites/1-logo.svg
tags:
  - Biodiversity
  - Nature
  - Citizen Science
  - Wildlife
  - Observations
  - Taxa
  - Ecology
created: '2026-06-13'
modified: '2026-06-13'
url: https://raw.githubusercontent.com/api-evangelist/inaturalist/main/apis.yml
