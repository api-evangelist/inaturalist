      - $ref: '#/parameters/ids_observation_taxon_id'
      - $ref: '#/parameters/ids_iconic_taxon_id'
      - $ref: '#/parameters/ids_observation_iconic_taxon_id'
      - $ref: '#/parameters/ids_lrank'
      - $ref: '#/parameters/ids_hrank'
