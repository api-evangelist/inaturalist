        type: integer
        in: query
        minimum: 1
        description: Only show observations of these taxa and their descendants
        required: true
      tags:
      - Identifications
      responses:
        '200':
          description: OK
definitions:
  User:
    type: object
    properties:
      created_at:
        type: string
        format: date-time
      id:
        type: integer
      icon:
        type: string
      icon_url:
        type: string
      identifications_count:
        type: integer
      journal_posts_count:
        type: integer
      login:
        type: string
      name:
        type: string
      observations_count:
        type: integer
      orcid:
        type: string
      roles:
        type: array
        items:
          type: string
          enum:
          - admin
          - app owner
          - curator
      site_id:
        type: integer
      species_count:
        type: integer
      spam:
        type: boolean
      suspended:
        type: boolean
  TaxonConservationStatus:
    allOf:
    - $ref: '#/definitions/RawConservationStatus'
    - type: object
      properties:
        place:
          $ref: '#/definitions/CorePlace'
  EstablishmentMeans:
    type: object
    properties:
      establishment_means:
        type: string
      place:
        $ref: '#/definitions/CorePlace'
  CorePlace:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      display_name:
        type: string
  SpeciesCountsResponse:
    allOf:
    - $ref: '#/definitions/BaseResponse'
    - required:
      - results
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              count:
                type: integer
              taxon:
                $ref: '#/definitions/ShowTaxon'
  ShowTaxon:
    allOf:
    - $ref: '#/definitions/CoreTaxon'
    - type: object
      properties:
        ancestor_ids:
          type: array
          items:
            type: integer
        colors:
          type: array
          items:
            $ref: '#/definitions/Color'
        conservation_status:
          $ref: '#/definitions/ConservationStatus'
        conservation_statuses:
          type: array
          items:
            $ref: '#/definitions/TaxonConservationStatus'
        default_photo:
          $ref: '#/definitions/TaxonPhoto'
        establishment_means:
          $ref: '#/definitions/EstablishmentMeans'
        observations_count:
          type: integer
        preferred_establishment_means:
          type: string
  ConservationStatus:
    type: object
    properties:
      place_id:
        type: integer
      place:
        $ref: '#/definitions/CorePlace'
      status:
        type: string
  PostIdentification:
    type: object
    properties:
      identification:
        type: object
        properties:
          observation_id:
            type: integer
          taxon_id:
            type: integer
          current:
            type: boolean
          body:
            type: string
  RawConservationStatus:
    type: object
    properties:
      source_id:
        type: integer
        description: 'Identifier for the iNat source record associated with this status,

          retrievable via https://www.inaturalist.org/sources/:id.json

          (this endpoint is not a part of our public API and is thus subject to

          change or removal)

          '
      authority:
        type: string
        description: 'Organization that declared this status

          '
      status:
        type: string
        description: 'Body of the status, often coded, particularly when the status comes

          from the IUCN or NatureServe. Consult the authority and/or the

          status URL for details about the meanings of codes.

          '
      status_name:
        type: string
        description: 'Human-readable name of the status if it was coded.

          '
      iucn:
        type: integer
        description: 'Coded value representing the equivalent IUCN status. Mappings:

          NOT_EVALUATED = 0, DATA_DEFICIENT = 5, LEAST_CONCERN = 10,

          NEAR_THREATENED = 20, VULNERABLE = 30, ENDANGERED = 40,

          CRITICALLY_ENDANGERED = 50, EXTINCT_IN_THE_WILD = 60, EXTINCT = 70

          '
      geoprivacy:
        type: string
        description: 'Default geoprivacy for observations of this taxon in the status''s place.

          '
  Error:
    type: object
    properties:
      code:
        type: integer
      message:
        type: string
  Photo:
    type: object
    properties:
      id:
        type: integer
      attribution:
        type: string
      license_code:
        type: string
      url:
        type: string
  CoreTaxon:
    type: object
    properties:
      id:
        type: integer
      iconic_taxon_id:
        type: integer
      iconic_taxon_name:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      preferred_common_name:
        type: string
      rank:
        type: string
      rank_level:
        type: number
  BaseResponse:
    type: object
    properties:
      total_results:
        type: integer
      page:
        type: integer
      per_page:
        type: integer
  Color:
    type: object
    properties:
      id:
        type: integer
      value:
        type: string
  UserCountsResponse:
    allOf:
    - $ref: '#/definitions/BaseResponse'
    - required:
      - results
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              count:
                type: integer
              user:
                $ref: '#/definitions/User'
  TaxonPhoto:
    allOf:
    - $ref: '#/definitions/Photo'
    - type: object
      properties:
        medium_url:
          type: string
        square_url:
          type: string
