      '
  not_id:
    name: not_id
    type: array
    items:
      type: string
    in: query
    minimum: 1
    description: Must not have this ID
  viewed:
    name: viewed
    type: boolean
    in: query
    description: Notification has been viewed by the user before
  hrank:
    name: hrank
    type: string
    in: query
    description: Taxon must have this rank or lower
    enum:
    - stateofmatter
    - kingdom
    - phylum
    - subphylum
    - superclass
    - class
    - subclass
    - superorder
    - order
    - suborder
    - infraorder
    - superfamily
    - epifamily
    - family
    - subfamily
    - supertribe
    - tribe
    - subtribe
    - genus
    - genushybrid
    - species
    - hybrid
    - subspecies
    - variety
    - form
  taxon_is_active:
    name: taxon_is_active
    type: boolean
    in: query
