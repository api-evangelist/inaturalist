  popular:
    name: popular
    type: boolean
    in: query
    description: 'Observations that have been favorited by at least one user

      '
  ofv_datatype:
    name: ofv_datatype
    type: array
    items:
      type: string
    in: query
    minimum: 1
    maximum: 31
