    - names
    - tags
    - description
    - place
  since:
    name: since
    type: string
    format: date-time
    in: query
    required: true
    description: Deleted at or after this time
  created_month:
    name: created_month
    type: array
    items:
      type: string
    in: query
    minimum: 1
    maximum: 12
    description: Must be created within this month
  created_d1:
    name: created_d1
    type: string
    format: date-time
    in: query
    description: Must be created at or after this time
  id:
    name: id
    type: array
    items:
      type: string
    in: query
    minimum: 1
    description: Must have this ID
  acc_below_or_unknown:
    name: acc_below_or_unknown
    type: string
    in: query
    description: Positional accuracy must be below this value (in meters) or be unknown
  q:
    name: q
    type: string
    in: query
    description: Search observation properties. Can be combined with `search_on`
  id_above:
    name: id_above
    type: string
    in: query
    description: Must have an ID above this value
  fails_dqa_subject:
    name: fails_dqa_subject
