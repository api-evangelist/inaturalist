parameters:
  observed_on:
    name: observed_on
    type: string
    format: date
    in: query
    description: Must be observed on this date
  created_year:
    name: created_year
    type: array
    items:
      type: string
    in: query
    minimum: 1
    description: Must be created within this year
  viewer_id:
    name: viewer_id
    type: string
    in: query
    description: See `reviewed`
  created_on:
    name: created_on
    type: string
    format: date
    in: query
    description: Must be created on this date
  list_id:
    name: list_id
    type: integer
    in: query
    description: Taxon must be in the list with this ID
  page:
    name: page
    type: string
    in: query
    description: Pagination `page` number
  unobserved_by_user_id:
    name: unobserved_by_user_id
    type: integer
    in: query
    description: Must not be of a taxon previously observed by this user
  lat:
    name: lat
    type: number
    format: double
    in: query
    description: 'Must be within a {`radius`} kilometer circle around this lat/lng

      (*lat, *lng, radius)

      '
  csa:
    name: csa
    type: string
    in: query
    description: 'Taxon must have a conservation status from this authority. If

      the `place_id` parameter is also specified, this will only consider

      statuses specific to that place

      '
  user_id:
    name: user_id
    type: array
    items:
      type: string
    in: query
    minimum: 1
    description: User must have this ID or login
  ttl:
    name: ttl
    type: string
    in: query
    description: 'Set the `Cache-Control` HTTP header with this value as `max-age`, in

      seconds. This means subsequent identical requests will be cached on

      iNaturalist servers, and commonly within web browsers

      '
  sound_license:
    name: sound_license
    type: array
    items:
      type: string
    in: query
    description: Must have at least one sound with this license
    enum:
    - cc-by
    - cc-by-nc
    - cc-by-nd
    - cc-by-sa
    - cc-by-nc-nd
    - cc-by-nc-sa
    - cc0
  preferred_place_id:
    name: preferred_place_id
    type: integer
    in: query
    description: 'Place preference for regional taxon common names

      '
  out_of_range:
    name: out_of_range
    type: boolean
    in: query
    description: Observations whose taxa are outside their known ranges
  identifications:
    name: identifications
    type: string
    in: query
    description: Identifications must meet these criteria
    enum:
    - most_agree
    - most_disagree
    - some_agree
  per_page_species_counts:
    name: per_page
    type: string
    in: query
    description: 'Number of results to return in a `page`. The maximum value is 500

      '
  photos:
    name: photos
    type: boolean
    in: query
    description: Observations with photos
  locale:
    name: locale
    type: string
    in: query
    description: 'Locale preference for taxon common names

      '
  taxon_id:
    name: taxon_id
    type: array
    items:
      type: string
    in: query
    minimum: 1
    description: Only show observations of these taxa and their descendants
  lng:
    name: lng
    type: number
    format: double
    in: query
    description: 'Must be within a {`radius`} kilometer circle around this lat/lng

      (*lat, *lng, radius)

      '
  quality_grade:
    name: quality_grade
    type: string
    in: query
    description: Must have this quality grade
    enum:
    - casual
    - needs_id
    - research
  term_value_id:
    name: term_value_id
    type: array
    items:
      type: integer
    in: query
    description: 'Must have an annotation using this controlled value ID. Must be combined

      with the `term_id` parameter

      '
  mappable:
    name: mappable
    type: boolean
    in: query
    description: Observations that show on map tiles
  native:
    name: native
    type: boolean
    in: query
    description: Observations whose taxa are native to their location
  ident_user_id:
    name: ident_user_id
    type: integer
    in: query
    description: Observations identified by a particular user
  taxon_name:
    name: taxon_name
    type: array
    items:
      type: string
    in: query
    description: 'Taxon must have a scientific or common name matching this string

      '
  year:
    name: year
    type: array
    items:
      type: string
    in: query
    minimum: 1
    description: Must be observed within this year
  endemic:
    name: endemic
    type: boolean
    in: query
    description: Observations whose taxa are endemic to their location
  interval:
    name: interval
    in: query
    required: false
    type: string
    description: 'Time interval for histogram, with groups starting on or contained within

      the group value. The year, month, week, day, and hour options will set

      default values for `d1` or `created_d1` depending on the value of

      `date_field`, to limit the number of groups returned. You can override

      those values if you want data from a longer or shorter time span. The

      `hour` interval only works with `date_field=created`, and this you

      should filter dates with `created_d[1,2]`

      '
    default: month_of_year
    enum:
    - year
    - month
    - week
    - day
    - hour
    - month_of_year
    - week_of_year
  nelng:
    name: nelng
    type: number
    format: double
    in: query
    description: 'Must be within this bounding box (*nelat, *nelng, *swlat, *swlng)

      '
  acc_above:
    name: acc_above
    type: string
    in: query
    description: Must have a positional accuracy above this value (meters)
  order_by:
    name: order_by
    type: string
    in: query
    description: Sort field
    default: created_at
    enum:
    - created_at
    - geo_score
    - id
    - observed_on
    - random
    - species_guess
    - updated_at
    - votes
  fails_dqa_recent:
    name: fails_dqa_recent
    type: boolean
    in: query
    description: Must be voted as not recent evidence of an organism
  path_metric:
    name: metric
    in: path
    required: true
    type: string
    description: Data quality category
    enum:
    - date
    - location
    - wild
  without_term_value_id:
    name: without_term_value_id
    type: array
    items:
      type: integer
    in: query
    description: 'Exclude observations with annotations using this controlled value ID.

      Must be combined with the `term_id` parameter

      '
  created_day:
    name: created_day
    type: array
    items:
      type: string
    in: query
    minimum: 1
    maximum: 31
    description: Must be created within this day of the month
  site_id:
    name: site_id
    type: array
    items:
      type: string
    in: query
    description: 'Must be affiliated with the iNaturalist network website with this ID

      '
  expected_nearby:
    name: expected_nearby
    type: boolean
    in: query
    description: Observation taxon is expected nearby
  fails_dqa_needs_id:
    name: fails_dqa_needs_id
    type: boolean
    in: query
    description: Must be voted as the community ID cannot be improved
  d2:
    name: d2
    type: string
    format: date
    in: query
    description: Must be observed on or before this date
  fails_dqa_wild:
    name: fails_dqa_wild
    type: boolean
    in: query
    description: Must be voted as not wild
  place_id:
    name: place_id
