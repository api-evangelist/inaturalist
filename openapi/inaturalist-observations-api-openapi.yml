definitions:
  PostQuality:
    type: object
    properties:
      agree:
        type: boolean
  User:
    type: object
    properties:
      created_at:
        type: string
        format: date-time
      id:
        type: integer
      icon:
        type: string
      icon_url:
        type: string
      identifications_count:
        type: integer
      journal_posts_count:
        type: integer
      login:
        type: string
      name:
        type: string
      observations_count:
        type: integer
      orcid:
        type: string
      roles:
        type: array
        items:
          type: string
          enum:
          - admin
          - app owner
          - curator
      site_id:
        type: integer
      species_count:
        type: integer
      spam:
        type: boolean
      suspended:
        type: boolean
  ObservationsShowResponse:
    allOf:
    - $ref: '#/definitions/BaseResponse'
    - required:
      - results
      properties:
        results:
          type: array
          items:
            $ref: '#/definitions/ShowObservation'
  TaxonConservationStatus:
    allOf:
    - $ref: '#/definitions/RawConservationStatus'
    - type: object
      properties:
        place:
          $ref: '#/definitions/CorePlace'
  EstablishmentMeans:
    type: object
    properties:
      establishment_means:
        type: string
      place:
        $ref: '#/definitions/CorePlace'
  PostObservationVote:
    type: object
    properties:
      vote:
        type: string
        enum:
        - up
        - down
      scope:
        enum:
        - needs_id
  CorePlace:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      display_name:
        type: string
  ObservationPhoto:
    type: object
    properties:
      id:
        type: integer
      uuid:
        type: string
      photo:
        $ref: '#/definitions/Photo'
      position:
        type: integer
  SpeciesCountsResponse:
    allOf:
    - $ref: '#/definitions/BaseResponse'
    - required:
      - results
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              count:
                type: integer
              taxon:
                $ref: '#/definitions/ShowTaxon'
  Identification:
    type: object
    properties:
      id:
        type: integer
      observation_id:
        type: integer
      body:
        type: string
      category:
        type: string
        enum:
        - improving
        - leading
        - maverick
        - supporting
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      current:
        type: boolean
      taxon:
        $ref: '#/definitions/ObservationTaxon'
      previous_observation_taxon:
        $ref: '#/definitions/ObservationTaxon'
      user:
        $ref: '#/definitions/User'
      uuid:
        type: string
      created_at_details:
        $ref: '#/definitions/DateDetails'
      flags:
        type: array
        items:
          $ref: '#/definitions/Flag'
      own_observation:
        type: boolean
      taxon_change:
        type: object
        properties:
          id:
            type: integer
          type:
            type: string
      vision:
        type: boolean
      disagreement:
        type: boolean
      previous_observation_taxon_id:
        type: integer
      spam:
        type: boolean
      hidden:
        type: boolean
      moderator_actions:
        type: array
        items:
          $ref: '#/definitions/ModeratorAction'
  ShowTaxon:
    allOf:
    - $ref: '#/definitions/CoreTaxon'
    - type: object
      properties:
        ancestor_ids:
          type: array
          items:
            type: integer
        colors:
          type: array
          items:
            $ref: '#/definitions/Color'
        conservation_status:
          $ref: '#/definitions/ConservationStatus'
        conservation_statuses:
          type: array
          items:
            $ref: '#/definitions/TaxonConservationStatus'
        default_photo:
          $ref: '#/definitions/TaxonPhoto'
        establishment_means:
          $ref: '#/definitions/EstablishmentMeans'
        observations_count:
          type: integer
        preferred_establishment_means:
          type: string
  ConservationStatus:
    type: object
    properties:
      place_id:
        type: integer
      place:
        $ref: '#/definitions/CorePlace'
      status:
        type: string
  Fave:
    type: object
    properties:
      id:
        type: integer
      votable_id:
        type: integer
      created_at:
        type: string
        format: date-time
      user:
        $ref: '#/definitions/User'
  RawConservationStatus:
    type: object
    properties:
      source_id:
        type: integer
        description: 'Identifier for the iNat source record associated with this status,

          retrievable via https://www.inaturalist.org/sources/:id.json

          (this endpoint is not a part of our public API and is thus subject to

          change or removal)

          '
      authority:
        type: string
        description: 'Organization that declared this status

          '
      status:
        type: string
        description: 'Body of the status, often coded, particularly when the status comes

          from the IUCN or NatureServe. Consult the authority and/or the

          status URL for details about the meanings of codes.

          '
      status_name:
        type: string
        description: 'Human-readable name of the status if it was coded.

          '
      iucn:
        type: integer
        description: 'Coded value representing the equivalent IUCN status. Mappings:

          NOT_EVALUATED = 0, DATA_DEFICIENT = 5, LEAST_CONCERN = 10,

          NEAR_THREATENED = 20, VULNERABLE = 30, ENDANGERED = 40,

          CRITICALLY_ENDANGERED = 50, EXTINCT_IN_THE_WILD = 60, EXTINCT = 70

          '
      geoprivacy:
        type: string
        description: 'Default geoprivacy for observations of this taxon in the status''s place.

          '
  Error:
    type: object
    properties:
      code:
        type: integer
      message:
        type: string
  Photo:
    type: object
    properties:
      id:
        type: integer
      attribution:
        type: string
      license_code:
        type: string
      url:
        type: string
  PointGeoJson:
    type: object
    properties:
      type:
        type: string
      coordinates:
        type: array
        description: an array of [long, lat]
        items:
          type: number
          format: double
  Flag:
    type: object
    properties:
      id:
        type: integer
      flag:
